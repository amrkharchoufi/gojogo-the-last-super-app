name: Deploy backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_IMAGE: 578109959809.dkr.ecr.us-east-1.amazonaws.com/gojogo-backend:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run tests
        working-directory: backend
        run: mvn -B test

      - name: Build and push image (Jib)
        working-directory: backend
        run: |
          mvn -B -DskipTests compile jib:build \
            -Djib.image="$ECR_IMAGE" \
            -Djib.to.auth.username=AWS \
            -Djib.to.auth.password="$(aws ecr get-login-password --region "$AWS_REGION")"

      - name: Trigger App Runner deployment
        run: |
          SERVICE_ARN=$(aws apprunner list-services \
            --query "ServiceSummaryList[?ServiceName=='gojogo-backend'].ServiceArn" --output text)
          aws apprunner start-deployment --service-arn "$SERVICE_ARN"
