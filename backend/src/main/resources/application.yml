spring:
  application:
    name: gojogo-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gojogo}
    username: ${DB_USER:gojogo}
    password: ${DB_PASSWORD:gojogo}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    default-schema: public
    schemas: public,profile,social,media
    create-schemas: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${COGNITO_ISSUER_URI:https://cognito-idp.us-east-1.amazonaws.com/replace-me}

gojogo:
  media:
    bucket: ${MEDIA_BUCKET:}
    cdn-domain: ${MEDIA_CDN_DOMAIN:}

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
